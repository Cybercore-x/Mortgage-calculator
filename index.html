<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortgage Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,100..900;1,100..
900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="node_modules/normalize.css/normalize.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
       <h1>Mortgage Calculator</h1>
       <button id="clear-all">Clear All</button>

    <form id="mortgage-form">
    <div class="input-group">
        <label for="amount">Mortgage Amount</label>
        <div class="input-container">
        <span>$</span>
        <input type="number" required name="mortgage-amount" id="mortgage-amount" placeholder="300,000">
        </div>
    </div>

    <div class="input-group">
        <label for="term">Mortgage Term</label>
        <div class="input-container">
        <span>years</span>
        <input type="number" required id="mortgage-term" placeholder="30">
        </div>
    </div>

    <div class="input-group">
        <label for="rate">Interest Rate</label>
        <div class="input-container">
        <span>%</span>
        <input type="number" required id="interest-rate" placeholder="5.25 %">
        </div>
    </div>

    <div class="radio-group">
        <label for="type">Mortgage Type</label>
        <div class="radio-span">
        <input type="radio" name="option" id="repayment">
        <label for="repayment">Repayment</label>
        </div>
        <div class="radio-span">
        <input type="radio" name="option" id="interest-only">
        <label for="interest-only">Interest Only</label>
        </div>
    </div>
    <button id="Calculate">🖩 Calculate Repayments</button>
    </form>
    <section class="footer">
        <div class="footer-div">
        <h2>Your results</h2>
        <p>Your results are shown below based <br>
         on the information you provided.</p>
         <div id="result"></div>
        </div>
    </section>

    </main>
    <script src="index.js"></script>
    
</body>
</html>
